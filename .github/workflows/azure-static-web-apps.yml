name: Azure Static Web Apps CI/CD

# main へのマージ（push）で Azure Static Web Apps 本番環境へデプロイする。
# PR 時の検証（型チェック・テスト）は ci.yml が担う。
# デプロイ先リソース: rg-libcheck / libcheck (Free)
on:
  push:
    branches: [main]
  # 初回デプロイや再デプロイを手動実行できるようにする。
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build And Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # The React app lives at the repo root; its API (Azure Functions) in api/.
          app_location: "/"
          api_location: "api"
          output_location: "dist"
