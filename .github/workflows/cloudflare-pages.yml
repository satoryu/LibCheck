name: Deploy to Cloudflare Pages

# main へのマージ（push）で Cloudflare Pages 本番へデプロイする。
# PR 時の検証（型チェック・テスト）は ci.yml が担う。
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build
        env:
          # Amazon アソシエイトタグ（公開値）。リポジトリ変数から本番ビルドに注入。
          VITE_AMAZON_ASSOCIATE_TAG: ${{ vars.AMAZON_ASSOCIATE_TAG }}
        run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler.toml の name / pages_build_output_dir を使用。
          # functions/ ディレクトリは自動でバンドルされる。
          command: pages deploy
