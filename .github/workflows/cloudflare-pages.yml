name: Deploy to Cloudflare Pages

# main へのマージ（push）で Cloudflare Pages 本番へデプロイする。
# PR 時の検証（型チェック・テスト）は ci.yml が担う。
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build
        env:
          # Amazon アソシエイトタグ（公開値）。リポジトリ変数から本番ビルドに注入。
          VITE_AMAZON_ASSOCIATE_TAG: ${{ vars.AMAZON_ASSOCIATE_TAG }}
          # Google OAuth クライアント ID（公開値）。GIS のログインに使う。
          VITE_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
        run: npm run build
      # スキーマ→コードの順序を保証するため、デプロイの「前」に本番 D1 へ
      # マイグレーションを適用する（#83）。適用済みは d1_migrations 表で判定され
      # 冪等にスキップ。ここが失敗すると後続の deploy には進まない。
      - name: Apply D1 migrations (remote)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply libcheck --remote
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler.toml の name / pages_build_output_dir を使用。
          # functions/ ディレクトリは自動でバンドルされる。
          command: pages deploy
