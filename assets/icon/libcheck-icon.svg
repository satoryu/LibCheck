<?xml version="1.0" encoding="UTF-8"?>
<!--
  LibCheck アプリアイコン（マスター）。
  Knowledge Cartography 配色: 緑青地 + 羊皮紙のカード + ティールの本 + 真鍮の請求記号。
  full-bleed の背景なので maskable（セーフゾーン内に主要素を収める）にも使える。
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12463F"/>
      <stop offset="1" stop-color="#0E3B36"/>
    </linearGradient>
  </defs>

  <!-- 背景（full-bleed・maskable 対応） -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- 貸出カード（羊皮紙）。セーフゾーン(中央80%)内に収める -->
  <g>
    <rect x="116" y="96" width="280" height="320" rx="18" fill="#FBF8F0"/>
    <!-- カード上辺のティール罫 -->
    <rect x="116" y="96" width="280" height="14" rx="7" fill="#00796B"/>

    <!-- 請求記号風ラベル -->
    <text x="140" y="156" font-family="'Courier New',monospace" font-size="26"
          font-weight="700" letter-spacing="3" fill="#B8894B">010</text>
    <!-- ラベル下の破線（ミシン目） -->
    <line x1="140" y1="176" x2="372" y2="176" stroke="#B8894B" stroke-width="3"
          stroke-dasharray="6 7" opacity="0.7"/>

    <!-- 本（ティール）: 開いた本のシルエット -->
    <g transform="translate(256 268)">
      <path d="M -86 -34 C -52 -52 -16 -52 0 -40 C 16 -52 52 -52 86 -34
               L 86 50 C 52 34 16 34 0 46 C -16 34 -52 34 -86 50 Z"
            fill="#00796B"/>
      <!-- ページの折り目 -->
      <line x1="0" y1="-40" x2="0" y2="46" stroke="#FBF8F0" stroke-width="6"/>
      <!-- ページの罫線 -->
      <line x1="-66" y1="-20" x2="-14" y2="-13" stroke="#FBF8F0" stroke-width="4" opacity="0.7"/>
      <line x1="-66" y1="2"   x2="-14" y2="9"   stroke="#FBF8F0" stroke-width="4" opacity="0.7"/>
      <line x1="14" y1="-13"  x2="66" y2="-20"  stroke="#FBF8F0" stroke-width="4" opacity="0.7"/>
      <line x1="14" y1="9"    x2="66" y2="2"    stroke="#FBF8F0" stroke-width="4" opacity="0.7"/>
    </g>

    <!-- 「貸出可能」を示すチェックスタンプ（赤・回転） -->
    <g transform="translate(330 360) rotate(-8)">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#C0392B" stroke-width="6"/>
      <path d="M -18 0 L -5 14 L 20 -16" fill="none" stroke="#C0392B"
            stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
